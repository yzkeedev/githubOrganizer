<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opportunity Radar</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-copy">
        <h1>Opportunity Radar</h1>
        <p class="subtitle">A quiet daily pulse for trends worth building on.</p>
      </div>
      <div class="hero-meta">
        <div class="meta-block">
          <span class="meta-label">Mode</span>
          <strong id="mode-pill">Loading</strong>
        </div>
        <div class="meta-block">
          <span class="meta-label">Date</span>
          <strong id="date-pill">--</strong>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <label class="control">
        <span>Report Date</span>
        <select id="report-select"></select>
      </label>
      <label class="control">
        <span>Category</span>
        <select id="category-filter"></select>
      </label>
      <label class="control">
        <span>Sort By</span>
        <select id="sort-select">
          <option value="founder">Founder score</option>
          <option value="opportunity">Overall signal</option>
          <option value="revenue">Revenue potential</option>
          <option value="match">Trend fit</option>
        </select>
      </label>
      <a class="button button-quiet" id="markdown-link" href="../opportunities/" target="_blank" rel="noreferrer">Open report</a>
    </section>

    <section class="stats" id="stats"></section>

    <section class="layout">
      <aside class="panel collection-sidebar">
        <div class="panel-header">
          <h2>Collection</h2>
          <span id="collection-count">Loading collection</span>
        </div>
        <div class="collection-toolbar">
          <label class="control control-search">
            <span>Search</span>
            <input id="collection-search" type="search" placeholder="Search titles, trends, repos">
          </label>
          <div class="collection-toolbar-row">
            <label class="control">
              <span>Date</span>
              <select id="collection-date-filter"></select>
            </label>
            <label class="control">
              <span>Sort</span>
              <select id="collection-sort">
                <option value="momentum">Momentum</option>
                <option value="latest">Latest first</option>
                <option value="founder">Founder score</option>
                <option value="revenue">Revenue score</option>
                <option value="name">Name</option>
              </select>
            </label>
          </div>
        </div>
        <details class="sidebar-disclosure">
          <summary>
            <span>Collection stats</span>
            <span class="disclosure-hint">Optional</span>
          </summary>
          <div class="collection-stats" id="collection-stats"></div>
        </details>
        <div id="collection-nav" class="collection-nav"></div>
      </aside>

      <div class="main-column">
        <section class="panel collection-detail-panel">
          <div class="panel-header">
            <h2>Selected Collection</h2>
            <span id="collection-selection-label">Choose a title</span>
          </div>
          <div id="collection-detail"></div>
        </section>

        <details class="panel disclosure-panel ideas-panel">
          <summary>
            <div class="panel-header">
              <h2>Daily Ideas</h2>
              <span id="idea-count"></span>
            </div>
          </summary>
          <div id="ideas-list" class="stack"></div>
        </details>
      </div>

      <aside class="rail">
        <section class="panel rail-panel">
          <div class="panel-header">
            <h2>Signals</h2>
            <span id="rail-label">Founder bets</span>
          </div>
          <div class="tabs" id="rail-tabs">
            <button class="tab-button is-active" type="button" data-tab="ranking">Bets</button>
            <button class="tab-button" type="button" data-tab="trends">Trends</button>
            <button class="tab-button" type="button" data-tab="sources">Sources</button>
          </div>
          <div class="tab-panel is-active" data-panel="ranking">
            <div class="subtle-meta" id="ranking-label"></div>
            <div id="ranking-list" class="stack"></div>
          </div>
          <div class="tab-panel" data-panel="trends">
            <div class="subtle-meta" id="trend-count"></div>
            <div id="trends-list" class="stack compact"></div>
          </div>
          <div class="tab-panel" data-panel="sources">
            <div class="subtle-meta" id="source-count"></div>
            <div id="source-health" class="source-grid"></div>
          </div>
        </section>
      </aside>
    </section>

    <details class="panel disclosure-panel history-panel">
      <summary class="disclosure-summary">
        <div class="panel-header">
          <h2>History</h2>
          <span id="history-count"></span>
        </div>
      </summary>
      <div id="history-list" class="history-list"></div>
    </details>
  </div>

  <template id="empty-card-template">
    <article class="empty-card">
      <h3></h3>
      <p class="copy"></p>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
